<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .componente_mira {
            .mira {
                position: absolute;
                width: 8vh;
                height: 8vh;
                border: 4px solid #aeff40;
                top: 48.8vh;
                left: 25.1vw;
                transform: translate(-50%, -50%);
                z-index: 2;
            }


            /* linha vertical com degradê na parte de baixo */
            .mira1 {
                position: absolute;
                width: 2px;
                min-height: calc(100vh - 48.8px);
                background-color: #aeff40;
                top: 48.8px;
                left: 25vw;
                border: 2px solid #aeff40;
                z-index: 2;

                -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
                mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            }

            /* linha horizontal */
            .mira2 {
                position: absolute;
                width: 100%;
                height: 2px;
                background-color: #aeff40;
                top: 48.5vh;
                left: 0;
                border: 2px solid #aeff40;
                z-index: 2;
            }

            .nome-voucher {
                z-index: 3;
                position: absolute;
                top: 42.5vh;
                left: calc((100vw - 400px) / 2);
                /* left: 38.1vw; */
                width: 400px;
                /* transform: translateY(-40px); */

                img {
                    width: 100%;
                    /* height: auto; */
                }
            }
        }
    </style>
</head>

<body>
    <div class="componente_mira">
        <div class="mira"></div>
        <div class="mira1"></div>
        <div class="mira2">

        </div>
        <div class="nome-voucher">
            <img src="nome.png" alt="Voucher Desenvolvedor">
        </div>
    </div>
</body>

</html>
