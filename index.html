<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Final do Componente SVG</title>
    <!-- Adicionando as fontes para o logotipo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Estilos básicos para a visualização */
        body {
            background-color: #1a1a1a;
            /* CORREÇÃO: Removemos o display flex para que o container possa ocupar 100% */
            margin: 0;
            padding: 0; /* Removemos o padding para que o SVG toque as bordas */
        }

        /* O container principal do nosso componente */
        .componente-svg-container {
            width: 100%;
            max-width: none; 
            display: flex; /* Usamos flex aqui para centralizar o SVG verticalmente */
            align-items: center;
            min-height: 100vh;
        }

        /* O SVG em si é fluido e responsivo */
        .componente-svg-unificado {
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>

    <div class="componente-svg-container">
        <svg 
            class="componente-svg-unificado" 
            viewBox="0 0 1920 1105" 
            preserveAspectRatio="xMidYMid meet">

            <!-- 1. A MIRA (baseada no seu último SVG, com coordenadas corrigidas) -->
            <g class="mira-svg-grupo" fill="none" stroke="#AEFF40" stroke-width="5.5">
                
                <!-- Linha Horizontal (dividida para o logo) -->
                <!-- A linha agora vai de 0 a 1920, tocando as bordas da "tela" (viewBox) -->
                <line y1="379" x1="0" x2="750" y2="379" />
                <line y1="379" x1="1170" x2="1920" y2="379" />

                <!-- Linha Vertical -->
                <line x1="354" y1="1105" x2="354" y2="58" />
                
                <!-- Quadrado da Mira -->
                <rect x="319" y="344" width="70.5" height="70.5" />
            </g>

            <!-- 2. O LOGOTIPO (recriado com texto para fidelidade e controle) -->
            <!-- O 'transform' posiciona o grupo do logo exatamente no centro (960) 
                 e na altura da linha horizontal (379) -->
            <g class="logotipo-svg-grupo" transform="translate(960, 379)">
                <!-- Fundo verde para a palavra "VOUCHER" -->
                <rect x="-200" y="-50" width="400" height="45" fill="#abfa3d" />
                
                <!-- Texto "VOUCHER" -->
                <text x="0" y="-18" font-family="'Bebas Neue', sans-serif" font-size="38" fill="#000000" text-anchor="middle" letter-spacing="3">VOUCHER</text>
                
                <!-- Texto "DESENVOLVEDOR" -->
                <text x="0" y="40" font-family="'Oswald', sans-serif" font-weight="700" font-size="50" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">DESENVOLVEDOR</text>
            </g>
        </svg>
    </div>

</body>
</html>
