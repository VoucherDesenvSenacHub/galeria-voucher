<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOBRE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/area-adm/tela-inicial-adm/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>
    <div class="container"> 
        <aside class="sidebar">
            <ul class="menu">
                <li><a href="#">USUARIOS</a></li>
                <li><a href="#">TURMAS</a></li>
                <li><a href="#">ESTATÍSTICAS <i class="icon-lock"></i></a></li>
            </ul>
        </aside>

        <header> 
            <nav>
                <div class="imgvoucher">
                    <img src="/area-adm/tela-inicial-adm/assets/voucher-logo.png" width="150px" />
                </div>
                <ul>
                    <li><a href="">HOME</a></li>
                    <li><a href="">TURMAS</a></li>
                    <li><a href="" class="botao-person">
                        <span class="material-symbols-outlined">person</span>

                    </a></li>
                </ul>
            </nav>
        </header>

        <main class="cadastraturma">
            <div class="header2">
                <button class="turma"> TURMA </button>
                <button class="sobre"> SOBRE </button>
                <button class="imagens"> IMAGENS </button>
              </div>

            
            <div class="painelsobre">
                <div class="formulario-com-icone">
                    <div class="formulario">
                        <h1>CADASTRO</h1>
                        <form action="" method="POST">
                            <div class="input-group">
                                <input type="text" id="name" name="name" placeholder="Nome:">
                            </div>
                            <div class="input-group">
                                <input type="text" id="ano" name="ano" placeholder="Ano da Turma:">
                            </div>
                            <div class="input-group">
                                <input type="text" id="polo" name="polo" placeholder="Polo:">
                            </div>
                            <div class="input-group">
                                <input type="text" id="docentes" name="docentes" placeholder="Docentes:">
                            </div>
                            <div class="input-group">
                                <input type="text" id="alunos" name="alunos" placeholder="Alunos:">
                            </div>
                        </form>
                    </div>                  
                </div>
            </div>
        </main>
    </div>
</body>
</html>
